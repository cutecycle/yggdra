name: Airgapped Security Audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  airgap-audit:
    name: Airgapped Security Audit
    runs-on: ubuntu-latest
    container:
      image: rust:latest
      options: --network none # ENSURE ZERO NETWORKING
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y pkg-config libssl-dev

      - name: Build Release
        run: cargo build --release

      - name: Security Audit: Verify No Network Access
        run: |
          # We run a specialized test that attempts to reach a known external IP.
          # This should fail if the sandbox/tool implementation is working correctly
          # and if the container itself is truly isolated.
          
          # Use a timeout to ensure we don't hang forever if networking is accidentally enabled
          # We use a custom test binary or run the existing test that attempts network calls
          cargo test --test preposterous_stress_tests --test_network_isolation -- --nocapture || EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "❌ SECURITY BREACH: Network access was permitted inside the container!"
            exit 1
          elif [ $EXIT_CODE -eq 101 ]; then
            echo "✅ Security check passed: Network access was blocked as expected."
          else
            echo "⚠️ Test finished with unexpected exit code: $EXIT_CODE"
            exit $EXIT_CODE
          fi
