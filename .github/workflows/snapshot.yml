name: Snapshot Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (Linux / macOS)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/yggdra"
          ARCHIVE="yggdra-snapshot-${{ github.sha }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $binary = "target\${{ matrix.target }}\release\yggdra.exe"
          $archive = "yggdra-snapshot-${{ github.sha }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggdra-${{ matrix.target }}
          path: ${{ env.ASSET }}
          retention-days: 7

  release:
    name: Create Snapshot Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create snapshot release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot-${{ github.sha }}
          name: Snapshot — ${{ github.ref_name }} @ ${{ github.sha }}
          body: |
            Automated snapshot release from main branch.
            
            **Commit:** ${{ github.sha }}
            **Author:** ${{ github.actor }}
            
            Built from: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          draft: false
          prerelease: true
          files: artifacts/**/*
